apis:
  - aid: greenly-earth:greenly-carbon-analytics-api
    name: Greenly Carbon Analytics API
    description: >-
      The Greenly Carbon Analytics API (v1.5) is a RESTful service that
      enriches bank-card and expense transactions with carbon-footprint
      analytics. Given a transaction label (raw or cleaned), country, amount,
      and currency, the API classifies the spend into a purchase category,
      detects the merchant/provider, and returns estimated CO2-equivalent
      emissions plus optional lower-carbon alternatives. Companion endpoints
      expose the purchase-category taxonomy, the list of recommended
      lower-carbon provider alternatives, the catalog of verified carbon
      offset projects, an offset-booking endpoint, basic user management,
      and standard live/ready health probes. Two environments are published:
      a sandbox at https://apisandbox.greenly.earth/v1.5 and production at
      https://api.greenly.earth/v1.5. Access requires an API key obtained by
      emailing contact@greenly.earth; the key is passed in the api-key
      request header. JSON in and out; sample Postman requests are available.
    humanURL: https://api.greenly.earth/v1.5
    baseURL: https://api.greenly.earth/v1.5
