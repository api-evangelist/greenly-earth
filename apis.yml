aid: greenly-earth
name: Greenly
description: >-
  Greenly is a Paris-headquartered (with offices in London and New York)
  carbon accounting platform focused on small and mid-sized businesses,
  helping companies measure, reduce, and report their greenhouse-gas
  emissions across Scope 1, 2, and 3. The platform automates carbon
  footprint calculations from accounting, expense, supplier, energy, and
  cloud data; produces regulator-aligned Bilan Carbone, GHG Protocol, CSRD,
  CBAM, EUDR, SBTi, CDP, TCFD/IFRS, EcoVadis, and California climate
  disclosure deliverables; supports product-level LCA; recommends supplier
  alternatives; and offers a marketplace for verified carbon-offset projects.
  Greenly also exposes a developer-facing Carbon Analytics REST API
  (v1.5, hosted at api.greenly.earth) historically built by Offspend, which
  banks and fintechs use to enrich bank-card transactions with per-purchase
  CO2 emissions, classify spend into purchase categories, surface lower-carbon
  alternatives, and book offset volumes against vetted projects — sandbox and
  production environments are available with API-key authentication on
  request to contact@greenly.earth.
